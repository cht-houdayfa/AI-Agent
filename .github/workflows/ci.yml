name: CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          python-version: '3.10'
          
      - name: Set up Python
        uses: actions/setup-python@v5
        
      - name: Check syntax
        run: |
          pip install pycodestyle
          pycodestyle app_expenses.py